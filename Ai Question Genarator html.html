<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Question Generator — Free Cert Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root { --purple: #7c3aed; --green: #16a34a; --orange: #ea580c; --bg: #f8fafc; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); margin: 0; user-select: none; }
  nav { background: #fff; padding: 1rem 2rem; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: 'Baloo 2', cursive; font-size: 1.5rem; color: var(--purple); font-weight: 800; }
  
  .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  .config-card { background: #fff; border-radius: 24px; padding: 2rem; border: 2px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1.5rem; }
  
  label { display: block; font-weight: 800; margin-bottom: 0.5rem; color: #475569; }
  select, input { width: 100%; padding: 0.8rem; border-radius: 12px; border: 2px solid #e2e8f0; font-family: inherit; font-size: 1rem; outline: none; }
  select:focus { border-color: var(--purple); }

  .gen-btn { width: 100%; margin-top: 2rem; background: var(--purple); color: #fff; border: none; padding: 1.2rem; border-radius: 50px; font-size: 1.1rem; font-weight: 900; cursor: pointer; transition: 0.2s; }
  .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(124, 58, 237, 0.3); }

  /* Paper Preview Area */
  #paper-preview { display: none; margin-top: 2rem; background: #fff; padding: 3rem; border-radius: 10px; border: 1px solid #000; position: relative; min-height: 500px; }
  .watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-45deg); font-size: 4rem; opacity: 0.05; font-weight: 900; pointer-events: none; }
  
  .print-btn { display: none; margin-top: 1rem; background: #1e293b; color: white; border: none; padding: 0.8rem 2rem; border-radius: 10px; cursor: pointer; float: right; font-weight: 700; }
  
  .loading-overlay { display: none; text-align: center; padding: 2rem; }
  .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--purple); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav>
  <a href="dashboard.html" class="logo" style="text-decoration:none;">FreeCert<span>Hub</span></a>
  <div style="font-weight: 700; color: #64748b;">Unlimited AI Question Bank</div>
</nav>

<div class="container">
  <div class="config-card">
    <h2 style="font-family:'Baloo 2'; margin:0; color: var(--purple);">Generate New Question Paper</h2>
    <p style="color: #64748b; margin-top: 0.5rem;">Select your parameters and our AI will create a unique, tough exam for you.</p>
    
    <div class="grid">
      <div>
        <label>Category</label>
        <select id="category">
          <option value="ncert">NCERT (School)</option>
          <option value="upsc">UPSC / Civil Services</option>
          <option value="coding">Programming (Python/Web)</option>
          <option value="jee">JEE / NEET</option>
        </select>
      </div>
      <div>
        <label>Difficulty</label>
        <select id="difficulty">
          <option value="easy">Beginner</option>
          <option value="medium">Standard</option>
          <option value="hard">Tough (Pro Level)</option>
        </select>
      </div>
      <div>
        <label>Number of Questions</label>
        <input type="number" id="num-q" value="10" min="5" max="50">
      </div>
      <div>
        <label>Paper Type</label>
        <select id="type">
          <option value="mcq">Multiple Choice (MCQ)</option>
          <option value="descriptive">Descriptive (Written)</option>
          <option value="mixed">Mixed (MCQ + Written)</option>
        </select>
      </div>
    </div>

    <button class="gen-btn" onclick="generatePaper()">✨ Generate Unlimited Paper</button>
  </div>

  <div class="loading-overlay" id="loader">
    <div class="spinner"></div>
    <p style="font-weight: 700; color: var(--purple);">AI is analyzing the syllabus and drafting unique questions...</p>
  </div>

  <button class="print-btn" id="print-btn" onclick="window.print()">🖨️ Download as PDF</button>
  
  <div id="paper-preview">
    <div class="watermark">FREE CERT HUB</div>
    <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 1rem; margin-bottom: 2rem;">
        <h1 id="p-title" style="margin:0; text-transform: uppercase;">UPSC PRELIMS MOCK TEST</h1>
        <p><b>Time Allowed: 2 Hours</b> | <b>Maximum Marks: 100</b></p>
    </div>
    <div id="questions-list">
        <!-- AI Content goes here -->
    </div>
  </div>
</div>

<script>
  function generatePaper() {
    const category = document.getElementById('category').value;
    const count = document.getElementById('num-q').value;
    const type = document.getElementById('type').value;
    
    // Hide old results and show loader
    document.getElementById('paper-preview').style.display = 'none';
    document.getElementById('print-btn').style.display = 'none';
    document.getElementById('loader').style.display = 'block';

    // Simulate AI Generation
    setTimeout(() => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('paper-preview').style.display = 'block';
      document.getElementById('print-btn').style.display = 'block';
      
      const list = document.getElementById('questions-list');
      document.getElementById('p-title').innerText = `${category} - ${type} Series`;
      
      list.innerHTML = "";
      for(let i=1; i<=count; i++) {
        const qBox = document.createElement('div');
        qBox.style.marginBottom = "1.5rem";
        
        if(type === 'mcq' || (type === 'mixed' && i <= count/2)) {
            qBox.innerHTML = `
                <p><b>Q${i}.</b> This is a unique AI-generated question for the ${category} category based on recent exam patterns. Which of the following best describes the core concept?</p>
                <p style="margin-left: 20px;">A) Option One Description<br>B) Option Two Description<br>C) Option Three Description<br>D) Option Four Description</p>
            `;
        } else {
            qBox.innerHTML = `
                <p><b>Q${i}.</b> Analyze and discuss the impact of technology on the ${category} domain. Provide a detailed explanation in at least 250 words. [10 Marks]</p>
                <div style="border: 1px dashed #ccc; height: 100px; margin-top: 10px;"></div>
            `;
        }
        list.appendChild(qBox);
      }
    }, 2500);
  }
</script>

</body>
</html>
