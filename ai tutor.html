<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  :root { --purple: #7c3aed; --green: #16a34a; }
  
  /* FLOATING BUTTON */
  #bot-launcher {
    position: fixed; bottom: 30px; right: 30px;
    width: 65px; height: 65px; background: var(--purple);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 10px 25px rgba(124, 58, 237, 0.4);
    z-index: 1000; transition: transform 0.3s;
  }
  #bot-launcher:hover { transform: scale(1.1) rotate(10deg); }

  /* CHAT WINDOW */
  #chat-window {
    position: fixed; bottom: 110px; right: 30px;
    width: 350px; height: 500px; background: white;
    border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    display: none; flex-direction: column; overflow: hidden;
    z-index: 1000; border: 1px solid #e2e8f0;
    font-family: 'Nunito', sans-serif;
  }

  .chat-header { background: var(--purple); color: white; padding: 1.2rem; display: flex; align-items: center; gap: 10px; }
  .chat-header h3 { margin: 0; font-family: 'Baloo 2'; font-size: 1.2rem; }
  .online-dot { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s infinite; }

  .chat-messages { flex: 1; padding: 1rem; overflow-y: auto; background: #f8fafc; display: flex; flex-direction: column; gap: 10px; }
  .msg { max-width: 80%; padding: 0.8rem; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; }
  .bot-msg { background: white; border: 1px solid #e2e8f0; align-self: flex-start; color: #1e293b; border-bottom-left-radius: 2px; }
  .user-msg { background: var(--purple); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

  .chat-input-area { padding: 1rem; background: white; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; }
  .chat-input-area input { flex: 1; border: 1px solid #e2e8f0; padding: 0.6rem; border-radius: 10px; outline: none; }
  .send-btn { background: var(--purple); color: white; border: none; padding: 0.5rem 1rem; border-radius: 10px; cursor: pointer; font-weight: 800; }

  @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
</style>
</head>
<body>

<!-- BOT ICON -->
<div id="bot-launcher" onclick="toggleChat()">
    <img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" width="35" alt="Bot">
</div>

<!-- CHAT WINDOW -->
<div id="chat-window">
  <div class="chat-header">
    <div class="online-dot"></div>
    <h3>AI Tutor Assistant</h3>
  </div>
  
  <div class="chat-messages" id="chat-msgs">
    <div class="msg bot-msg">Hello! I'm your Free Cert Hub assistant. Need help with the <b>Python</b> lesson or <b>UPSC</b> questions? Ask me anything!</div>
  </div>

  <div class="chat-input-area">
    <input type="text" id="user-input" placeholder="Ask a question..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = (win.style.display === 'flex') ? 'none' : 'flex';
  }

  function sendMessage() {
    const input = document.getElementById('user-input');
    const msgArea = document.getElementById('chat-msgs');
    
    if (input.value.trim() === "") return;

    // User Message
    const userDiv = document.createElement('div');
    userDiv.className = 'msg user-msg';
    userDiv.innerText = input.value;
    msgArea.appendChild(userDiv);

    const userText = input.value.toLowerCase();
    input.value = "";

    // AI Simulation Reply
    setTimeout(() => {
        const botDiv = document.createElement('div');
        botDiv.className = 'msg bot-msg';
        
        if (userText.includes("hello")) {
            botDiv.innerText = "Hi! Ready to study? Remember, you can't skip the video if you want the certificate! 🎓";
        } else if (userText.includes("cheat") || userText.includes("help")) {
            botDiv.innerText = "I can help with questions, but I won't give you the exam answers. That would trigger the cheat detector! 🔍";
        } else {
            botDiv.innerText = "That's a great question about " + userText + ". In your current lesson, we focus on the core fundamentals of that topic. Would you like a practice quiz?";
        }
        
        msgArea.appendChild(botDiv);
        msgArea.scrollTop = msgArea.scrollHeight;
    }, 1000);
  }
</script>
</body>
</html>
